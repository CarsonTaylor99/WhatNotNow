<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 240px;
    margin: 0;
    padding: 14px 14px 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e8e8f0;
  }
  h1 {
    font-size: 13px;
    margin: 0 0 10px;
    color: #00ff88;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .row { font-size: 11px; color: #888; margin: 4px 0; }
  .row b { color: #e8e8f0; }
  button {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    background: #00ff88;
    color: #000;
    font-weight: 700;
    font-size: 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  #result {
    margin-top: 8px;
    font-size: 11px;
    min-height: 14px;
  }
  .ok   { color: #00ff88; }
  .fail { color: #ff6b35; }
</style>
</head>
<body>
  <h1>Whatnot Token Pusher</h1>
  <div class="row" id="status">Loading…</div>
  <div class="row" id="hint"></div>
  <button id="push-btn">Push now</button>
  <button id="refresh-btn" style="background:#ff6b35;color:#fff;">Force refresh now</button>
  <div id="result"></div>
  <div class="row" style="margin-top:8px;font-size:10px;opacity:0.6;">
    Open chrome://extensions → "service worker" link to see logs.
  </div>
  <script src="popup.js"></script>
</body>
</html>
